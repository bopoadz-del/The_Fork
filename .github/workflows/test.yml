name: tests

on:
  push:
    branches: [main, fork-export-temp]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for OCR + PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Security scan
        run: python scripts/security_scan.py

      - name: Run tests (excluding browser suite)
        # --cov-fail-under is a regression floor (current coverage ~28%);
        # it fails the job if coverage drops below it or if no tests collect.
        run: >
          pytest tests/ -v --tb=short --ignore=tests/browser
          --cov=app --cov-report=term-missing --cov-fail-under=25
        env:
          ENV: testing
          DATA_DIR: ${{ runner.temp }}/data

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for OCR + PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Install Playwright Chromium + system libs
        run: |
          python -m playwright install --with-deps chromium

      - name: Run browser tests
        run: pytest tests/browser/ -v --tb=short
        env:
          ENV: development
          DATA_DIR: ${{ runner.temp }}/data
