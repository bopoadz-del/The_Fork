name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for OCR + PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Security scan
        run: python scripts/security_scan.py

      - name: Run tests (excluding browser suite)
        # --cov-fail-under is a regression FLOOR (current coverage ~28%);
        # the global gate fails the job if coverage drops below it or if no
        # tests collect. The diff-cover step below catches the orthogonal
        # case: "PR adds 200 lines, tests 5" can stay above 25% global
        # coverage while ratcheting NEW code toward zero coverage.
        # --cov-report=xml emits coverage.xml for diff-cover to read.
        run: >
          pytest tests/ -v --tb=short --ignore=tests/browser
          --cov=app --cov-report=term-missing --cov-report=xml
          --cov-fail-under=25
        env:
          ENV: testing
          DATA_DIR: ${{ runner.temp }}/data

      - name: Diff coverage (per-PR gate on lines changed)
        # Runs only on pull_request events — fetches the base branch so the
        # diff is computable. Compares coverage.xml against origin/<base>;
        # fails the PR if <50% of newly-changed lines are covered.
        #
        # `continue-on-error: true` for the initial rollout: until we have
        # a few data points on what real PRs hit, this surfaces the % as a
        # warning instead of blocking. Flip to false once we've seen the
        # baseline on 1-2 actual PRs (Step 4 of the audit-followups plan).
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          diff-cover coverage.xml \
            --compare-branch="origin/${{ github.base_ref }}" \
            --fail-under=50 \
            --html-report=diff-cover.html \
            --markdown-report=diff-cover.md
          echo "::group::diff-cover summary"
          cat diff-cover.md
          echo "::endgroup::"

      - name: Upload diff-cover report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-cover-report
          path: |
            diff-cover.html
            diff-cover.md
          retention-days: 14

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for OCR + PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Install Playwright Chromium + system libs
        run: |
          python -m playwright install --with-deps chromium

      - name: Run browser tests
        run: pytest tests/browser/ -v --tb=short
        env:
          ENV: development
          DATA_DIR: ${{ runner.temp }}/data
