name: Setup theshovel.ai DNS

on:
  workflow_dispatch:

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Cloudflare CNAME records
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: bash .claude/skills/cloudflare/setup-theshovel-dns.sh

      - name: Verify health endpoint
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "https://theshovel.ai/v1/health" >/dev/null 2>&1; then
              curl -sS "https://theshovel.ai/v1/health"
              exit 0
            fi
            echo "Waiting for DNS propagation... ($i/12)"
            sleep 10
          done
          echo "Health check failed — DNS may still be propagating"
          exit 1
