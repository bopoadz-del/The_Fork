name: Docker Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cerebrum-blocks

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # arm64 builds via QEMU emulation on free GHA runners take ~5-10x
      # the native build time. Combined with the multi-stage Python +
      # heavy native deps (pymupdf, ifcopenshell, numpy/scipy), the
      # arm64 leg alone runs 18-22 minutes — pushing the total build
      # past the ~10-minute validity window of the Azure SAS tokens the
      # `type=gha` cache backend uses, producing the "Signature not
      # valid in the specified time frame" 403s the build dies on.
      #
      # Single-arch (amd64) builds complete in ~3-4 minutes, well under
      # any cache-token lifetime. The deferred edge plan already says
      # arm64 belongs on a native arm64 runner (when the Orin arrives);
      # QEMU emulation here was paying CI time for an artefact nobody
      # uses yet.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Single-arch (amd64) only. arm64 returns when there is a
          # native arm64 runner OR an Orin actually in hand. See note
          # above the buildx step.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # `ignore-error: true` on cache-to is defense in depth. Even
          # with the short amd64-only build, a cache-write SAS could
          # theoretically expire if a runner is slow. With this flag,
          # cache push failures become warnings instead of failing the
          # whole build — we still get the image; the cache misses
          # next time but that's a cost-of-cache problem, not a
          # correctness problem.
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Print image digest
        run: echo "Image digest - ${{ steps.build-and-push.outputs.digest }}"
