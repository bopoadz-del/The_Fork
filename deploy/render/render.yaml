services:
  - type: web
    name: cerebrum-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        fromDatabase:
          name: cerebrum-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cerebrum-redis
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /v1/health

  - type: web
    name: cerebrum-dashboard
    env: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: ./dashboard/dist
    envVars:
      - key: VITE_API_URL
        value: https://cerebrum-api.onrender.com

  - type: redis
    name: cerebrum-redis
    plan: free
    ipAllowList: []

  - type: worker
    name: cerebrum-worker
    env: docker
    dockerfilePath: ./deploy/cloud/Dockerfile.worker
    plan: starter
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: cerebrum-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: cerebrum-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /app

databases:
  - name: cerebrum-db
    plan: free
    databaseName: cerebrum
    user: cerebrum
