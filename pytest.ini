[pytest]
asyncio_mode = auto

# Fail on unknown markers and on a malformed config — a typo
# (e.g. @pytest.mark.asyncoi) becomes an error, not a silent no-op.
addopts = --strict-markers --strict-config

markers =
    extended_boot: requires CEREBRUM_VIRGIN=false (extended platform blocks)
    construction_kit: requires CEREBRUM_DOMAIN_KITS=construction
